program: main.py
method: bayes
metric:
  name: val_loss       # what W&B minimizes — make sure you log this (see Step 4)
  goal: minimize

parameters:
  lr:
    distribution: log_uniform_values
    min: 1e-5
    max: 1e-2
  temperature:
    distribution: uniform
    min: 0.05
    max: 0.7
  d_model:
    values: [64]
  batch_size:
    values: [64]

early_terminate:        # kill bad runs early (Hyperband)
  type: hyperband
  min_iter: 3